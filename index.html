<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <style>
    body{
     font-family: Arial, Helvetica, sans-serif;
    background:#1e2a5a;
    margin:0;
    padding:20px;
     } 

h1{
    
    text-align:center;
    color:white;
    
}

.main{
    display:flex;
    gap:20px;
    margin-top:20px;

}

.leftcontainer, .rightcontainer{
   background:white;
    padding:20px;
    border-radius:10px;
    width:50%;
    
}

.leftcontainer{
    display: flex;
    gap:20px;
    justify-content: center;
    align-items: center;



}

.rightcontainer{
    display:flex;
    flex-direction:column;
    justify-content: center;
    align-items: center;

}

button{
    background:#0a7418;
    border:none;
    color:white;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2be654;
}
input{
    padding:8px;
    width:70%;
    border-radius:5px;
    border:1px solid gray;
}

#Search-history button{
    margin:5px;
}

.card{
    background:#f2f2f2;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

    </style>

</head>
<body>
    <h1>ASYNC WEATHER TRACKER</h1>
    <div class="main">
    <div class="leftcontainer">
       <div id="search-main-container">
        <form action="">
            <lable for="city">Enter city name:</lable>
            <input type="text" id="city" name="">
            <button type="submit">Search</button>
        </form>
       </div>

       <div id="history-main-container">
        <h4>Search History</h4>
        <div id="searched-history">
         <button>delhi</button>
         <button>mumbai</button>
         </div>
       </div>
 
    </div>
    <div class="rightcontainer">
        <h4>weather-info</h4>
        <div id="weather-data", class="card">
    </div>

    </div>
    </div>



    <script>
        "https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric";
        const API_KEY="1a761d3bb408836cd1af3641ce1604c9";
        let form=document.querySelector("form");
        let city=document.querySelector("#city");
        let wheatherContainer=document.querySelector("#weather-data");
        let historyContainer = document.querySelector("#searched-history");


        // Load history
let history = JSON.parse(localStorage.getItem("history")) || [];



function renderHistory() {
    historyContainer.innerHTML = "";

    history.forEach((city) => {
        let btn = document.createElement("button");
        btn.innerText = city;

        btn.addEventListener("click", () => {
            fetchWeather(city);
        });

        historyContainer.appendChild(btn);
    });}
        
        async function fetchWeather(city){
         let result= await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`)
         let data=await result.json()
         let card=document.createElement('div')
         card.innerHTML=`<h4>city:${data.name}</h4>
                         <h4>temp:${data.main.temp}</h4>
                         <h4>humidity:${data.main.humidity}</h4>
                         <h4>wind:${data.wind.speed}</h4>`

        wheatherContainer.innerHTML=""
                
        wheatherContainer.append(card)



         history.push(city);
    localStorage.setItem("history", JSON.stringify(history));

    renderHistory();

         
        }


        form.addEventListener("submit",(event)=>{
            event.preventDefault()
            fetchWeather(city.value);
            city.value="";
        });
        renderHistory();


      
    //emptyarray bnani h phir serach wali chiz ko usme append kra dena h then local storage m set krdena h phur loop lgana h usme jo local storage m elements hai phir unka button bna dena.
    

    </script>
</body>
</html>
